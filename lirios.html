<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
        <title>Un algo</title>
        <style>
            body{
                margin: 0;
                height: 100vh;
                overflow: hidden;
                display: flex;
                justify-content: center;
                align-items: center;
                background: radial-gradient(circle at center, #1a1a2e, #0f0f1a 80%);
                font-family: 'Georgia', serif;
                color: rgb(rgb(134, 11, 11));
            }

            /*TEXTO*/
            h1{
                position: absolute;
                text-align: center;
                font-size: 3rem;
                opacity: 0;
                z-index: 3;
                text-shadow: 0 0 10px #fff, 0 0 30px #b8f2e6;
            }

            /*NEBLINA*/
            .fog{
                position: absolute;
                width: 200%;
                height: 200%;
                background: radial-gradient(circle, rgba(255,255,255,0.05), transparent 70%);
                animation: fogMove 30s linear infinite;
            }

            @keyframes fogMove {
                from { transform: translate(-10%, -10%); }
                to { transform: translate(10%, 10%);}
            }

            /*FLORES*/
            .flower {
                position: absolute;
                width: 10px;
                height: 810px;
                background: linear-gradient(#3a5a40, #588157);
                border-radius: 5px;
                animation: sway 4s ease-in-out infinite alternate;
            }

            .flower ::before {
                content: '';
                position: absolute;
                top: -10px;
                left: -8px;
                width: 25px;
                height: 25px;
                background: white;
                border-radius: 50%;
                box-shadow: 
                0 10px 0 white,
                0 20px 0 white,
                0 30px 0 white;
            }

            @keyframes sway {
                from {transform: rotate(-3deg);}
                to {transform: rotate(3deg);}
            }

            /*PETALOS*/
            .petal{
                position: absolute;
                width: 6px;
                height: 6px;
                background: white;
                border-radius: 50%;
                opacity: 0.7;
                animation: fall linear infinite;
            }

            @keyframes fall {
                from {
                    transform: translateY(-10px) translateX(0);
                }
                to {
                    transform: translateY(100vh) translateX(50px);
                }
            }

            /*xd*/
        </style>
    </head>
</html>
