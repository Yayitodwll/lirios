<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un algo</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(rgba(15,15,26,0.7), rgba(15,15,26,0.9)), url(lirios.jpg);
    background-size: cover;
    background-position: center;
    font-family: 'Georgia', serif;
    color: white;
}

/* TEXTO */
h1 {
    position: absolute;
    text-align: center;
    font-size: 3rem;
    opacity: 0;
    z-index: 3;
    text-shadow: 0 0 10px #fff, 0 0 30px #b8f2e6;
}

/* NIEBLA */
.fog {
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.05), transparent 70%);
    animation: fogMove 30s linear infinite;
}

@keyframes fogMove {
    from { transform: translate(-10%, -10%); }
    to { transform: translate(10%, 10%); }
}

/* FLORES */
.flower {
    position: absolute;
    width: 10px;
    height: 80px;
    background: linear-gradient(#3a5a40, #588157);
    border-radius: 5px;
    animation: sway 4s ease-in-out infinite alternate;
}

.flower::before {
    content: '';
    position: absolute;
    left: -6px;
    top: -5px;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50% 50% 60% 60%;
    box-shadow:
        /* campanitas tipo lirio del valle a lo largo del tallo */
        6px 10px 0 0 white,
        -4px 18px 0 0 white,
        5px 26px 0 0 white,
        -3px 34px 0 0 white,
        4px 42px 0 0 white,
        -2px 50px 0 0 white;
    filter: drop-shadow(0 0 3px rgba(255,255,255,0.6));
}

@keyframes sway {
    from { transform: rotate(-3deg); }
    to { transform: rotate(3deg); }
}

/* PETALOS */
.petal {
    position: absolute;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    opacity: 0.7;
    animation: fall linear infinite;
}

@keyframes fall {
    from {
        transform: translateY(-10px) translateX(0);
    }
    to {
        transform: translateY(100vh) translateX(50px);
    }
}


/* NIEBLA CON CURSOR */
.cursor-fog {
    position: fixed;
    width: 120px;
    height: 120px;
    pointer-events: none;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.15), rgba(255,255,255,0.05), transparent 70%);
    filter: blur(15px);
    transform: translate(-50%, -50%);
    z-index: 2;
}

</style>
</head>

<body>

<div class="fog"></div>
<div class="cursor-fog" id="cursorFog"></div>
<h1 id="text"></h1>

<audio autoplay loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mpeg">
</audio>

<script>
// TEXTO QUE SE ESCRIBE SOLO
const message = "Un algo para mi delirio ✿";
let index = 0;
const textElement = document.getElementById("text");

function typeWriter() {
    if(index < message.length) {
        textElement.innerHTML += message.charAt(index);
        index++;
        setTimeout(typeWriter, 80);
    }
}

setTimeout(() => {
    textElement.style.opacity = 1;
    typeWriter();
}, 1000);

// CREAR FLORES
function createFlower() {
    const flower = document.createElement('div');
    flower.classList.add('flower');

    flower.style.left = Math.random() * window.innerWidth + 'px';
    flower.style.bottom = '-100px';
    flower.style.height = (60 + Math.random() * 80) + 'px';
    flower.style.animationDuration = (3 + Math.random() * 3) + 's';

    document.body.appendChild(flower);

    let position = -100;

    function animate() {
        position += 0.5;
        flower.style.bottom = position + 'px';

        if (position < window.innerHeight + 100) {
            requestAnimationFrame(animate);
        } else {
            flower.remove();
        }
    }

    animate();
}

setInterval(createFlower, 200);

// PETALOS
function createPetal() {
    const petal = document.createElement('div');
    petal.classList.add('petal');

    petal.style.left = Math.random() * window.innerWidth + 'px';
    petal.style.animationDuration = (5 + Math.random() * 5) + 's';

    document.body.appendChild(petal);

    setTimeout(() => petal.remove(), 10000);
}

setInterval(createPetal, 150);


// NIEBLA QUE SIGUE EL CURSOR
const cursorFog = document.getElementById('cursorFog');

document.addEventListener('mousemove', (e) => {
    cursorFog.style.left = e.clientX + 'px';
    cursorFog.style.top = e.clientY + 'px';
});

</script>

</body>
</html>
